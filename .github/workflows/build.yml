name: build-windows-exe

# Build l'exécutable Windows onefile.
#  - sur chaque tag v* : build + publication d'une Release GitHub avec le .exe
#  - manuellement (workflow_dispatch) : build + artefact téléchargeable
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build onefile exe
        run: >
          pyinstaller --onefile --windowed --uac-admin
          --name WebsiteBlocker
          --icon app_icon.ico
          --version-file version_info.txt
          --add-data "app_icon.ico;."
          website_blocker.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebsiteBlocker
          path: dist/WebsiteBlocker.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WebsiteBlocker.exe
